<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Phionah's Shops</title>
    <style>
        :root { 
            --blue: #004a99; 
            --gold: #d4af37; 
            --dark-blue: #1a2a3a;
            --sidebar-width: 260px;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            background: #2c3e50; /* Base gray-blue */
        }

        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            color: #555;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .nav-item.active { 
            background: #eef2f7; 
            color: var(--blue); 
            border-left-color: var(--gold); /* Golden indicator */
            font-weight: bold;
        }

        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            /* Floral-style gradient background */
            background: radial-gradient(circle at center, #3a4a5a 0%, #1a2a3a 100%);
            color: white; /* Text contrast for dark background */
        }

        .dashboard-section { display: none; }
        .dashboard-section.active { display: block; }

        h3 { color: var(--gold); }

        .box { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 10px; margin-bottom: 25px; color: #333; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: var(--blue); color: var(--gold); }
        
        .btn-add { background: var(--gold); color: black; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header" style="padding: 20px; color: var(--gold); font-weight: bold;">
        ADMIN DASHBOARD
    </div>
    <div class="nav-item active" onclick="switchTab('orders-tab', this)">📦 Customer Orders</div>
    <div class="nav-item" onclick="switchTab('add-inventory-tab', this)">➕ Add New Inventory</div>
    <div class="nav-item" onclick="switchTab('manage-inventory-tab', this)">🛠️ Manage Inventory</div>
    
    <div style="margin-top: auto; padding: 20px;">
        <a href="/logout" style="color: #d9534f; text-decoration: none; font-weight: bold;">Logout</a>
    </div>
</div>

<div class="main-content">
    <div id="orders-tab" class="dashboard-section active">
        <h3>📦 Order Requests</h3>
        <div class="box">
            <table>
                <thead>
                    <tr><th>ID</th><th>Customer</th><th>Items</th><th>Status</th></tr>
                </thead>
                <tbody>
                    {% for o in orders %}
                    <tr>
                        <td>#{{ o.order_id }}</td>
                        <td>{{ o.username }}</td>
                        <td>{{ o.item_name }}</td>
                        <td>{{ o.status }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    </div>

<script>
    function switchTab(tabId, element) {
        document.querySelectorAll('.dashboard-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }
</script>

</body>
</html>
