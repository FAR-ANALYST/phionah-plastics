<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Phionah's Shops</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .btn-csv { background: #28a745; color: white; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Orders (Last 30 Days)</h2>
            <a href="/export_orders" class="btn-csv">📥 Download CSV</a>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Customer</th><th>Items</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
                {% for o in orders %}
                <tr>
                    <td>#{{ o.order_id }}</td>
                    <td>{{ o.username }}<br><small>{{ o.phone }}</small></td>
                    <td>{{ o.item_name }}</td>
                    <td>{{ o.status }}</td>
                    <td>
                        {% if o.status == 'Pending' %}
                        <a href="/update_status/{{ o.order_id }}" style="color: blue;">Mark Shipped</a>
                        {% else %} ✅ {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br><a href="/logout">Logout</a>
    </div>
</body>
</html>
