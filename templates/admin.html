<!DOCTYPE html>
<html>
<head>
    <title>Admin - Phionah's Shops</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #004a99; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; grid-column: span 2; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between;">
        <h1>Admin Dashboard</h1>
        <a href="/logout" style="margin-top: 25px;">Logout</a>
    </div>

    <div class="box">
        <h2>Add Product</h2>
        <form action="/add_product" method="POST" enctype="multipart/form-data" class="form-grid">
            <input type="text" name="category" placeholder="Category (e.g., Home Cleaners)" required>
            <input type="text" name="name" placeholder="Item Name" required>
            <input type="text" name="description" placeholder="Size/Description (e.g., 5 Liters)" required>
            <input type="number" name="price" placeholder="Price (UGX)" required>
            <div style="grid-column: span 2;">
                <label>Product Image:</label>
                <input type="file" name="image" required>
            </div>
            <button type="submit">Add to Inventory</button>
        </form>
    </div>

    <div class="box">
        <h2>Orders</h2>
        <table>
            <tr><th>Customer</th><th>Items</th><th>Location</th><th>Status</th></tr>
            {% for o in orders %}
            <tr>
                <td><strong>{{ o.username }}</strong><br>{{ o.phone }}</td>
                <td>{{ o.item_name }}</td>
                <td>{{ o.location }}</td>
                <td>
                    {% if o.status == 'Pending' %}
                    <a href="/update_status/{{ o.order_id }}" style="color: green; font-weight: bold;">Ship</a>
                    {% else %}
                    {{ o.status }}
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
