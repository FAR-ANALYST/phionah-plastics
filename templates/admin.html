<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Phionah's Shops</title>
    <style>
        :root { 
            --blue: #001f3f; 
            --royal-purple: #6a0dad;
            --light-gray: #f4f7f6; 
            --sidebar-width: 260px;
            --royal-gradient: linear-gradient(135deg, #001f3f 0%, #6a0dad 50%, #ffd700 100%);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--light-gray); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding-top: 20px; border-top: 8px solid transparent; border-image: var(--royal-gradient) 1; }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: #555; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-item:hover { background: #f0f2f5; color: var(--royal-purple); }
        .nav-item.active { background: #eef2f7; color: var(--blue); border-left-color: var(--royal-purple); font-weight: bold; }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .dashboard-section { display: none; }
        .dashboard-section.active { display: block; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; }
        input, select { padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-add, .btn-csv { background: var(--royal-gradient); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        summary { background: #e9ecef; padding: 15px; cursor: pointer; font-weight: bold; color: var(--blue); border-left: 5px solid var(--royal-purple); list-style: none; display: flex; justify-content: space-between; align-items: center; }
        details[open] summary { background: var(--blue); color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header"><h2 style="color: var(--blue); font-size: 18px; margin: 0;">Admin Dashboard</h2></div>
    <div class="nav-item active" onclick="switchTab('orders-tab', this)"><span>📦 Customer Orders</span></div>
    <div class="nav-item" onclick="switchTab('add-inventory-tab', this)"><span>➕ Add New Inventory</span></div>
    <div class="nav-item" onclick="switchTab('manage-inventory-tab', this)"><span>🛠️ Manage Inventory</span></div>
    <div style="margin-top: auto; padding: 20px; border-top: 1px solid #eee;"><a href="/logout" style="color: #d9534f; text-decoration: none; font-weight: bold;">🚪 Logout</a></div>
</div>
<div class="main-content">
    </div>
<script>
    function switchTab(tabId, element) {
        document.querySelectorAll('.dashboard-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }
</script>
</body>
</html>
