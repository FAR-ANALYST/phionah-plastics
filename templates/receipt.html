<div style="text-align: center; border: 2px solid #000; padding: 20px; width: 300px; margin: auto;">
    <h2>Order #{{ order.order_id }}</h2>
    <p>Total: UGX {{ order.total_price }}</p>
    <p>Paid: UGX {{ order.amount_paid }}</p>
    <h3 style="color: red;">Balance: UGX {{ order.balance }}</h3>
    <p>Location: {{ order.location }}</p>
    <p><strong>Status: {{ order.status }}</strong></p>
    <p>Use Order ID {{ order.order_id }} to track.</p>
</div>
