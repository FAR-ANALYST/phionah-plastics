<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phionah's Shops | Order Online</title>
    <style>
        :root { 
            --orange: #ff6600; 
            --blue: #004a99; 
            --gold: #d4af37; /* Golden Text/Elements */
            --bg-floral: radial-gradient(circle at center, #4a4a4a 0%, #1a2a3a 100%); /* Gray to Dark Blue */
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-floral); 
            background-attachment: fixed;
            padding: 15px; 
            margin: 0; 
        }
        
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.96); 
            padding: 20px; 
            border-radius: 15px; 
            border-top: 8px solid var(--gold); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h2 { text-align: center; color: var(--gold); margin-bottom: 20px; text-shadow: 1px 1px 1px rgba(0,0,0,0.1); }
        
        .user-info input { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        .reveal-btn {
            background: var(--blue);
            color: var(--gold);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #inventory-list { display: none; }

        details { background: #fff; margin-bottom: 10px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        summary { background: #f8f9fa; color: var(--blue); padding: 15px; font-weight: bold; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: "▼"; font-size: 12px; }
        details[open] summary { background: var(--blue); color: var(--gold); }
        details[open] summary::after { content: "▲"; }

        .product-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f9f9f9; }
        .product-card img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; }
        .product-info { flex-grow: 1; }
        .product-info strong { display: block; color: #333; font-size: 14px; }
        .product-desc { display: block; color: #666; font-size: 12px; margin: 2px 0 5px 0; line-height: 1.3; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 14px; }
        .qty-input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }

        .total-box { background: var(--blue); color: var(--gold); text-align: center; padding: 18px; border-radius: 12px; margin: 20px 0; font-size: 1.2em; font-weight: bold; }
        .order-btn { background: var(--gold); color: #1a2a3a; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        .contact-section { margin-top: 30px; padding: 20px; background: #eef2f7; border-radius: 12px; text-align: center; border: 1px solid #ccd6e0; }
        .track-section { margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 12px; text-align: center; border: 1px dashed #ccc; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--gold);">Phionah's Shops</h2>
    
    <form action="/place_order" method="POST">
        <div class="user-info">
            <input type="text" name="username" placeholder="Your Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="text" name="location" placeholder="Delivery Location" required>
        </div>

        <button type="button" class="reveal-btn" id="revealBtn" onclick="showProducts()">🛍️ See Products</button>

        <div id="inventory-list">
            <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 15px;">Tap categories to browse. Tap photos to zoom.</p>
            {% for cat_name, items in categories.items() %}
            <details>
                <summary>{{ cat_name }}</summary>
                {% for p in items %}
                <div class="product-card">
                    <img src="{{ p.image_url }}" onclick="openModal(this.src)">
                    <div class="product-info">
                        <strong>{{ p.name }}</strong>
                        <span class="product-desc">{{ p.description }}</span>
                        <span class="product-price">UGX {{ "{:,}".format(p.price) }}</span>
                        <span class="price-val" data-price="{{ p.price }}" style="display:none;"></span>
                    </div>
                    <input type="number" name="qty_{{ p.id }}" class="qty-input" value="0" min="0" oninput="updateTotal()">
                </div>
                {% endfor %}
            </details>
            {% endfor %}

            <div class="total-box">Total: <span id="display-total">UGX 0</span></div>
            <input type="number" name="amount_paid" placeholder="Amount Paid (UGX)" required style="width:100%; padding:14px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
            <button type="submit" class="order-btn">🚀 Place My Order</button>
        </div>
    </form>

    <div class="contact-section">
        <h4 style="margin: 0 0 5px; color: var(--blue);">Payments & Inquiries</h4>
        <a href="tel:+256703070193" style="font-size: 18px; font-weight: bold; color: var(--gold); text-decoration: none;">+256 703 070 193</a>
    </div>
</div>

<div id="myModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="img01">
</div>

<script>
    function showProducts() { document.getElementById('inventory-list').style.display = 'block'; document.getElementById('revealBtn').style.display = 'none'; }
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.qty-input').forEach(input => {
            const card = input.closest('.product-card');
            const priceVal = card.querySelector('.price-val');
            if (priceVal) { total += (parseInt(priceVal.getAttribute('data-price')) || 0) * (parseInt(input.value) || 0); }
        });
        document.getElementById('display-total').innerText = "UGX " + total.toLocaleString();
    }
    function openModal(src) { document.getElementById("myModal").style.display = "flex"; document.getElementById("img01").src = src; }
    function closeModal() { document.getElementById("myModal").style.display = "none"; }
</script>
</body>
</html>
