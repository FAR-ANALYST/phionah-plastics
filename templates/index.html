<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garphy Home Essentials | Shop</title>
    <style>
        :root { --blue: #001f3f; --purple: #6a0dad; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--light); color: #333; }
        .header { background: var(--blue); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Product Toggle Styles */
        .toggle-container { text-align: center; margin: 20px 0; }
        #toggle-btn { width: 100%; max-width: 400px; padding: 15px; background: var(--purple); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        #product-section { display: none; animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .category-title { color: var(--blue); border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-top: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
        
        .order-form { background: white; padding: 25px; border-radius: 15px; margin-top: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .submit-btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>GARPHY HOME ESSENTIALS</h1>
    <p>Quality Plastics & Home Essentials</p>
</div>

<div class="container">
    <form action="/place_order" method="POST">
        <div class="order-form">
            <h3>1. Your Delivery Details</h3>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Phone Number (Mobile Money)</label>
                <input type="tel" name="phone" placeholder="07... or 07..." required>
            </div>
            <div class="input-group">
                <label>Delivery Location</label>
                <input type="text" name="location" placeholder="e.g. Kyambogo, Banda" required>
            </div>
        </div>

        <div class="toggle-container">
            <button type="button" id="toggle-btn" onclick="toggleProducts()">🛒 Tap to See Our Products</button>
        </div>

        <div id="product-section">
            {% for cat, items in categories.items() %}
            <h2 class="category-title">{{ cat }}</h2>
            <div class="product-grid">
                {% for p in items %}
                <div class="card">
                    <img src="{{ p.image_url }}" alt="{{ p.name }}">
                    <h4>{{ p.name }}</h4>
                    <p style="color: var(--purple); font-weight: bold;">UGX {{ "{:,}".format(p.price) }}</p>
                    <input type="number" name="qty_{{ p.id }}" value="0" min="0" style="width: 60px; padding: 5px; text-align: center; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                {% endfor %}
            </div>
            {% endfor %}
        </div>

        <div class="order-form" style="margin-top: 20px;">
            <h3>2. Payment Details</h3>
            <div class="input-group">
                <label>Payment Method</label>
                <select name="payment_method" required>
                    <option value="MTN Mobile Money">MTN Mobile Money</option>
                    <option value="Airtel Money">Airtel Money</option>
                    <option value="GTBank Transfer">GTBank Transfer</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
            </div>
            <div class="input-group">
                <label>Amount to Pay Now (UGX)</label>
                <input type="number" name="amount_paid" placeholder="Enter amount if paying now">
            </div>
            <button type="submit" class="submit-btn">✅ Place Order Now</button>
        </div>
    </form>
</div>

<script>
    function toggleProducts() {
        var section = document.getElementById("product-section");
        var btn = document.getElementById("toggle-btn");
        if (section.style.display === "none" || section.style.display === "") {
            section.style.display = "block";
            btn.innerText = "🔼 Hide Products";
        } else {
            section.style.display = "none";
            btn.innerText = "🛒 Tap to See Our Products";
        }
    }

    // Modal success logic (if applicable)
    {% if success %}
    alert("Order Placed Successfully! We will contact you shortly.");
    {% endif %}
</script>

</body>
</html>
