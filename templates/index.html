<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phionah's Shops Kampala</title>
    <style>
        :root { --orange: #ff6600; --blue: #004a99; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 8px solid var(--orange); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .product-card { display: flex; align-items: center; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
        .product-card img { width: 70px; height: 70px; border-radius: 5px; cursor: zoom-in; margin-right: 15px; object-fit: cover; }
        .total-box { background: var(--blue); color: white; text-align: center; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 1.4em; font-weight: bold; }
        button { background: var(--orange); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; }
        #imageModal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #imageModal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align: center; color: var(--blue);">Phionah's Shops</h2>
    <form action="/place_order" method="POST">
        <input type="text" name="username" placeholder="Full Name" required>
        <input type="text" name="location" placeholder="Delivery Location" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>

        <h3>Available Products</h3>
        {% for p in products %}
        <div class="product-card">
            <img src="{{ p.image_url }}" onclick="openModal(this.src)">
            <div style="flex-grow: 1;">
                <strong>{{ p.name }}</strong><br>
                <span class="price" data-price="{{ p.price }}" style="color: var(--orange);">UGX {{ "{:,}".format(p.price) }}</span>
            </div>
            <input type="number" name="qty_{{ p.id }}" value="0" min="0" style="width: 60px;" oninput="updateTotal()">
        </div>
        {% endfor %}

        <div class="total-box">Total: <span id="display-total">UGX 0</span></div>
        <div style="background: #fff9e6; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #ffcc00;">
            Airtel Money: <strong>0703070193</strong> (Naisanga Phiona)
        </div>
        <input type="number" name="amount_paid" placeholder="Amount Paid (UGX)" required>
        <button type="submit">Place Order</button>
    </form>

    <div style="margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px;">
        <h4>Track Your Order</h4>
        <form action="/track" method="POST" style="display: flex; gap: 5px;">
            <input type="number" name="order_id" placeholder="Order ID" required>
            <button type="submit" style="width: auto; background: var(--blue);">Track</button>
        </form>
    </div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script>
    function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imageModal').style.display = 'flex'; }
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.product-card').forEach(card => {
            const price = parseInt(card.querySelector('.price').getAttribute('data-price'));
            const qty = parseInt(card.querySelector('input[type="number"]').value) || 0;
            total += (price * qty);
        });
        document.getElementById('display-total').innerText = "UGX " + total.toLocaleString();
    }
</script>
</body>
</html>
