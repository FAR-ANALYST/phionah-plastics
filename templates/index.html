<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phionah's Shops | Order Online</title>
    <style>
        :root { --orange: #ff6600; --blue: #004a99; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            border-top: 8px solid var(--orange); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }

        h2 { text-align: center; color: var(--blue); margin-bottom: 20px; }
        
        /* Input Styling */
        .user-info input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        /* Category Header */
        .category-header { 
            background: var(--blue); 
            color: white; 
            padding: 10px 15px; 
            margin: 25px 0 10px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Product Cards */
        .product-card { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            background: #fff;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        
        .product-card img { 
            width: 70px; 
            height: 70px; 
            border-radius: 8px; 
            margin-right: 15px; 
            object-fit: cover; 
            background: #eee;
        }

        .product-info { flex-grow: 1; }
        .product-info strong { display: block; color: #333; font-size: 15px; }
        .product-info small { color: #777; font-size: 12px; }
        .product-price { color: var(--orange); font-weight: bold; display: block; margin-top: 4px; }

        /* Quantity Input */
        .qty-input { 
            width: 65px; 
            padding: 8px; 
            border: 2px solid #eee; 
            border-radius: 6px; 
            text-align: center; 
            font-weight: bold;
            color: var(--blue);
        }

        /* Footer & Total */
        .total-box { 
            background: var(--blue); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            border-radius: 12px; 
            margin: 20px 0; 
            font-size: 1.3em; 
            font-weight: bold; 
        }

        .order-btn { 
            background: var(--orange); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3);
        }

        .order-btn:active { transform: scale(0.98); }

        /* Track Order Section */
        .track-section {
            margin-top: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phionah's Shops</h2>
    
    <form action="/place_order" method="POST">
        <div class="user-info">
            <input type="text" name="username" placeholder="Your Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number (e.g. 070...)" required>
            <input type="text" name="location" placeholder="Delivery Location in Kampala" required>
        </div>

        <div id="inventory-list">
            {% for cat_name, items in categories.items() %}
            <div class="category-header">{{ cat_name }}</div>
            {% for p in items %}
            <div class="product-card">
                <img src="{{ p.image_url }}" alt="{{ p.name }}">
                <div class="product-info">
                    <strong>{{ p.name }}</strong>
                    <small>{{ p.description }}</small>
                    <span class="product-price">UGX {{ "{:,}".format(p.price) }}</span>
                    <span class="price-val" data-price="{{ p.price }}" style="display:none;"></span>
                </div>
                <input type="number" name="qty_{{ p.id }}" class="qty-input" value="0" min="0" oninput="updateTotal()">
            </div>
            {% endfor %}
            {% endfor %}
        </div>

        <div class="total-box">
            Total: <span id="display-total">UGX 0</span>
        </div>

        <input type="number" name="amount_paid" placeholder="Amount You are Paying Now (UGX)" required>
        
        <button type="submit" class="order-btn">🚀 Place My Order</button>
    </form>

    <div class="track-section">
        <p style="margin: 0 0 10px; font-size: 14px; color: #666;">Already ordered?</p>
        <form action="/track_order" method="POST" style="display: flex; gap: 8px;">
            <input type="number" name="order_id" placeholder="Order ID" required style="margin: 0; flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid #ddd;">
            <button type="submit" style="background: var(--blue); color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold;">Track</button>
        </form>
    </div>
</div>

<script>
    function updateTotal() {
        let total = 0;
        // Find all quantity inputs
        const inputs = document.querySelectorAll('.qty-input');
        
        inputs.forEach(input => {
            const card = input.closest('.product-card');
            const priceElement = card.querySelector('.price-val');
            
            if (priceElement) {
                const price = parseInt(priceElement.getAttribute('data-price')) || 0;
                const qty = parseInt(input.value) || 0;
                total += (price * qty);
            }
        });

        // Format and display the total with commas
        document.getElementById('display-total').innerText = "UGX " + total.toLocaleString();
    }
</script>

</body>
</html>
