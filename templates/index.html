<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phionah's Shops | Order Online</title>
    <style>
        :root { 
            --blue: #001f3f; --purple: #6a0dad; --gold: #ffd700;
            --grad: linear-gradient(135deg, #001f3f 0%, #6a0dad 50%, #ffd700 100%);
        }
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { 
            max-width: 500px; margin: auto; background: white; padding: 20px; 
            border-radius: 15px; border-top: 8px solid transparent; border-image: var(--grad) 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--blue); margin-bottom: 20px; }
        .user-info input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .reveal-btn, .order-btn, .check-btn { 
            background: var(--grad); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        details { border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        summary { padding: 15px; font-weight: bold; color: var(--blue); cursor: pointer; border-left: 5px solid var(--purple); background: #fafafa; }
        
        .product-card { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f9f9f9; }
        .product-card img { width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: cover; cursor: zoom-in; }
        
        .status-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; text-align: center; }
        .status-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phionah's Shops</h2>
    
    <form action="/place_order" method="POST">
        <div class="user-info">
            <input type="text" name="username" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="text" name="location" placeholder="Delivery Location" required>
        </div>

        <button type="button" class="reveal-btn" id="revealBtn" onclick="showProducts()">🛍️ See Products & Order</button>

        <div id="inventory-list" style="display:none;">
            {% for cat, items in categories.items() %}
            <details open>
                <summary>{{ cat }}</summary>
                {% for p in items %}
                <div class="product-card">
                    <img src="{{ p.image_url }}" onclick="openZoom(this.src)">
                    <div style="flex-grow:1;">
                        <strong>{{ p.name }}</strong><br>
                        <small class="price-display" data-price="{{ p.price }}">UGX {{ "{:,}".format(p.price) }}</small>
                    </div>
                    <input type="number" name="qty_{{ p.id }}" class="qty-input" value="0" min="0" style="width:55px; padding:5px; border-radius:5px; border:1px solid #ccc;" oninput="updateTotal()">
                </div>
                {% endfor %}
            </details>
            {% endfor %}

            <div style="background: var(--blue); color: white; padding: 15px; border-radius: 10px; text-align: center; margin: 15px 0;">
                <span id="display-total" style="font-size: 18px; font-weight: bold;">Total: UGX 0</span>
            </div>

            <button type="submit" class="order-btn">🚀 Place My Order</button>
        </div>
    </form>

    <div class="status-section">
        <h3 style="color: var(--blue); margin-bottom: 5px;">Track Order</h3>
        <div class="status-box">
            <input type="tel" id="statusPhone" placeholder="Enter phone number" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px;">
            <button type="button" class="check-btn" onclick="checkStatus()" style="padding: 10px;">🔍 Check Status</button>
            <div id="statusResult" style="margin-top: 10px; font-weight: bold; color: var(--purple);"></div>
        </div>
    </div>
</div>

<div id="zoomModal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;" onclick="this.style.display='none'">
    <img id="zoomImg" style="max-width:90%; max-height:80%; border-radius:10px;">
</div>

<script>
    function showProducts() {
        document.getElementById('inventory-list').style.display = 'block';
        document.getElementById('revealBtn').style.display = 'none';
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.product-card').forEach(card => {
            const qty = parseInt(card.querySelector('.qty-input').value) || 0;
            const price = parseInt(card.querySelector('.price-display').getAttribute('data-price')) || 0;
            total += (qty * price);
        });
        document.getElementById('display-total').innerText = "Total: UGX " + total.toLocaleString();
    }

    function openZoom(src) {
        document.getElementById("zoomModal").style.display = "flex";
        document.getElementById("zoomImg").src = src;
    }

    async function checkStatus() {
        const phone = document.getElementById('statusPhone').value;
        const resultDiv = document.getElementById('statusResult');
        if(!phone) return alert("Please enter a phone number");

        resultDiv.innerText = "Searching...";
        try {
            const response = await fetch(`/get_status?phone=${phone}`);
            const data = await response.json();
            resultDiv.innerText = data.status || "No order found.";
        } catch(e) {
            resultDiv.innerText = "Error checking status.";
        }
    }
</script>

</body>
</html>
