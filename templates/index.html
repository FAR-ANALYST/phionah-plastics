<!DOCTYPE html>
<html>
<head>
    <title>Phionah's Shops Kampala</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Phionah's Plastics & Cookware</h1>
    <p>Select your items and quantities below:</p>

    <form action="/place_order" method="POST">
        <input type="text" name="username" placeholder="Your Name" required>
        <input type="text" name="location" placeholder="Delivery Location" required>
        
        <table border="1">
            <tr>
                <th>Product</th>
                <th>Price (UGX)</th>
                <th>Quantity</th>
            </tr>
            {% for p in products %}
            <tr>
                <td>
                    <img src="{{ url_for('static', filename='images/' + p.image_url) }}" width="50"><br>
                    {{ p.name }}
                </td>
                <td>{{ "{:,}".format(p.price) }}</td>
                <td>
                    <input type="number" name="qty_{{ p.id }}" value="0" min="0">
                </td>
            </tr>
            {% endfor %}
        </table>

        <h3>Payment Information</h3>
        <p>Airtel Money: 0703070193 (Kagulire Farouk)</p>
        <input type="number" name="amount_paid" placeholder="Amount Paid (UGX)" required>
        
        <button type="submit">Place Order</button>
    </form>
</body>
</html>
