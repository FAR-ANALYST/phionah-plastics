<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phionah's Shops | Order Online</title>
    <style>
        :root { --orange: #ff6600; --blue: #004a99; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            border-top: 8px solid var(--orange); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }

        h2 { text-align: center; color: var(--blue); margin-bottom: 20px; }
        
        .user-info input { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }

        /* Dropdown Category Styling */
        details {
            background: #fff;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        summary {
            background: var(--blue);
            color: white;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary::-webkit-details-marker { display: none; }
        summary::after { content: "▼"; font-size: 12px; }
        details[open] summary::after { content: "▲"; }

        /* Product Cards */
        .product-card { 
            display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f9f9f9;
        }
        
        .product-card img { 
            width: 60px; height: 60px; border-radius: 8px; margin-right: 15px; object-fit: cover; cursor: pointer; border: 1px solid #ddd;
        }

        .product-info { flex-grow: 1; }
        .product-info strong { display: block; color: #333; font-size: 14px; }
        .product-price { color: var(--orange); font-weight: bold; font-size: 14px; }

        .qty-input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }

        .total-box { background: var(--blue); color: white; text-align: center; padding: 18px; border-radius: 12px; margin: 20px 0; font-size: 1.2em; font-weight: bold; }

        .order-btn { background: var(--orange); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3); }

        /* Order Tracking Section */
        .track-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed #ccc;
        }

        /* Image Modal (Zoom) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
        }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phionah's Shops</h2>
    
    <form action="/place_order" method="POST">
        <div class="user-info">
            <input type="text" name="username" placeholder="Your Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="text" name="location" placeholder="Delivery Location" required>
        </div>

        <div id="inventory-list">
            <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 15px;">Tap categories to browse. Tap photos to zoom.</p>
            
            {% for cat_name, items in categories.items() %}
            <details>
                <summary>{{ cat_name }}</summary>
                {% for p in items %}
                <div class="product-card">
                    <img src="{{ p.image_url }}" onclick="openModal(this.src)" alt="{{ p.name }}">
                    <div class="product-info">
                        <strong>{{ p.name }}</strong>
                        <span class="product-price">UGX {{ "{:,}".format(p.price) }}</span>
                        <span class="price-val" data-price="{{ p.price }}" style="display:none;"></span>
                    </div>
                    <input type="number" name="qty_{{ p.id }}" class="qty-input" value="0" min="0" oninput="updateTotal()">
                </div>
                {% endfor %}
            </details>
            {% endfor %}
        </div>

        <div class="total-box">Total: <span id="display-total">UGX 0</span></div>
        
        <input type="number" name="amount_paid" placeholder="Amount Paid (UGX)" required style="width:100%; padding:14px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
        
        <button type="submit" class="order-btn">🚀 Place My Order</button>
    </form>

    <div class="track-section">
        <h4 style="margin: 0 0 10px; color: var(--blue);">Track Your Order</h4>
        <p style="margin: 0 0 15px; font-size: 13px; color: #666;">Enter your Order ID to check status</p>
        <form action="/track_order" method="POST" style="display: flex; gap: 10px;">
            <input type="number" name="order_id" placeholder="ID" required style="flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 0;">
            <button type="submit" style="background: var(--blue); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Check</button>
        </form>
    </div>
</div>

<div id="myModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="img01">
</div>

<script>
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.qty-input').forEach(input => {
            const card = input.closest('.product-card');
            const priceVal = card.querySelector('.price-val');
            if (priceVal) {
                const price = parseInt(priceVal.getAttribute('data-price')) || 0;
                const qty = parseInt(input.value) || 0;
                total += (price * qty);
            }
        });
        document.getElementById('display-total').innerText = "UGX " + total.toLocaleString();
    }

    function openModal(src) {
        document.getElementById("myModal").style.display = "flex";
        document.getElementById("img01").src = src;
    }
    
    function closeModal() {
        document.getElementById("myModal").style.display = "none";
    }

    window.onclick = function(event) {
        let modal = document.getElementById("myModal");
        if (event.target == modal) { closeModal(); }
    }
</script>

</body>
</html>
